<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante Soto</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="encabezado">
    <div class="container text-center py-4">
      <h1>Restaurante Soto</h1>
      <p>Menú y sistema de reservas</p>
    </div>
  </header>

  <main class="container my-5">

    <!-- MENÚ -->
    <section class="mb-5">

      <h2 class="mb-3">Menú del Restaurante</h2>

      <div class="mb-4">
        <button class="boton-filtro activo" id="btn-todos">
          Todos
        </button>

        <button class="boton-filtro" id="btn-entradas">
          Entradas
        </button>

        <button class="boton-filtro" id="btn-fuertes">
          Platos Fuertes
        </button>

        <button class="boton-filtro" id="btn-postres">
          Postres
        </button>
      </div>

      <div id="contenedor-menu" class="row g-4"></div>

    </section>

    <!-- FORMULARIO -->
    <section class="mb-5">

      <h2 class="mb-3">Formulario de Reservas</h2>

      <form id="form-reserva">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label for="nombre" class="form-label">
              Nombre completo
            </label>

            <input
              type="text"
              id="nombre"
              class="form-control"
            >

            <div id="error-nombre" class="error-campo"></div>
          </div>

          <div class="col-md-6 mb-3">
            <label for="correo" class="form-label">
              Correo electrónico
            </label>

            <input
              type="email"
              id="correo"
              class="form-control"
            >

            <div id="error-correo" class="error-campo"></div>
          </div>

          <div class="col-md-4 mb-3">
            <label for="fecha" class="form-label">
              Fecha de reserva
            </label>

            <input
              type="date"
              id="fecha"
              class="form-control"
            >

            <div id="error-fecha" class="error-campo"></div>
          </div>

          <div class="col-md-4 mb-3">
            <label for="hora" class="form-label">
              Hora
            </label>

            <select id="hora" class="form-control">
              <option value="">Seleccione una hora</option>
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="18:00">18:00</option>
              <option value="19:00">19:00</option>
              <option value="20:00">20:00</option>
            </select>

            <div id="error-hora" class="error-campo"></div>
          </div>

          <div class="col-md-4 mb-3">
            <label for="personas" class="form-label">
              Número de personas
            </label>

            <input
              type="number"
              id="personas"
              class="form-control"
            >

            <div id="error-personas" class="error-campo"></div>
          </div>

          <div class="col-12 mb-3">
            <label for="comentarios" class="form-label">
              Comentarios
            </label>

            <textarea
              id="comentarios"
              class="form-control"
              rows="3"
            ></textarea>
          </div>

          <div class="col-12">
            <button
              type="submit"
              id="btn-reservar"
              class="boton-reserva"
              disabled
            >
              Registrar Reserva
            </button>
          </div>

        </div>

      </form>

    </section>

    <!-- TABLA DE RESERVAS -->
    <section class="mb-5">

      <h2 class="mb-3">Reservas Registradas</h2>

      <div class="table-responsive">

        <table class="table table-bordered">

          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
            </tr>
          </thead>

          <tbody id="tabla-reservas">
          </tbody>

        </table>

      </div>

    </section>

    <!-- RESUMEN -->
    <section>

      <h2 class="mb-3">Resumen</h2>

      <div id="resumen" class="resumen-reservas">
        No hay reservas registradas.
      </div>

    </section>

  </main>

  <script src="js/app.js"></script>

</body>
</html>
